<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Programming Master - Learn Programming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            overflow-x: hidden;
        }

        .navbar {
            background: #1e1e2e;
            border-bottom: 1px solid #2d2d44;
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            font-size: 24px;
            color: #00a6ff;
        }

        .logo h1 {
            font-size: 18px;
            background: linear-gradient(135deg, #00a6ff, #00ff9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .language-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 6px 14px;
            background: #2d2d44;
            border: none;
            border-radius: 20px;
            color: #a0a0c0;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s;
        }

        .lang-btn:hover, .lang-btn.active {
            background: #00a6ff;
            color: white;
        }

        /* Main Layout - Same on all devices */
        .main-container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 60px);
        }

        /* Sidebar - Fixed width, always visible */
        .sidebar {
            width: 280px;
            background: #1e1e2e;
            border-right: 1px solid #2d2d44;
            padding: 20px 12px;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }

        .sidebar h3 {
            color: white;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .topic-list {
            list-style: none;
        }

        .topic-list li {
            margin-bottom: 4px;
        }

        .topic-list a {
            color: #a0a0c0;
            text-decoration: none;
            display: block;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .topic-list a:hover, .topic-list a.active {
            background: #2d2d44;
            color: #00a6ff;
        }

        /* Hide sidebar on non-home pages */
        .sidebar.hide-sidebar {
            display: none;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 20px 30px;
            background: #0a0e27;
        }

        /* When sidebar hidden, content takes full width */
        .sidebar.hide-sidebar + .content-area {
            width: 100%;
        }

        .topic-header h2 {
            font-size: 28px;
            color: white;
            margin-bottom: 20px;
        }

        .content h3 {
            color: #00a6ff;
            font-size: 18px;
            margin: 20px 0 12px 0;
        }

        .content p {
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .content ul {
            color: #e0e0e0;
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .content li {
            margin: 6px 0;
            font-size: 14px;
        }

        .code-block {
            background: #1e1e2e;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
            border: 1px solid #2d2d44;
        }

        .code-header {
            background: #2d2d44;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-header span {
            color: #00a6ff;
            font-family: monospace;
            font-size: 12px;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: #a0a0c0;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        .copy-btn:hover {
            background: #3d3d5c;
            color: white;
        }

        pre {
            margin: 0;
            padding: 15px;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #d4d4d4;
            background: #1e1e2e;
        }

        .quiz-section {
            background: #1e1e2e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            border: 1px solid #2d2d44;
        }

        .quiz-section h3 {
            color: white;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .quiz-question h4 {
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .quiz-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            background: #2d2d44;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quiz-option:hover {
            background: #3d3d5c;
        }

        .quiz-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .quiz-option label {
            color: #e0e0e0;
            cursor: pointer;
            flex: 1;
            font-size: 14px;
        }

        .quiz-feedback {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
            font-size: 14px;
        }

        .quiz-feedback.correct {
            background: rgba(0, 255, 100, 0.15);
            border-left: 3px solid #00ff64;
            color: #a0ffa0;
            display: block;
        }

        .quiz-feedback.wrong {
            background: rgba(255, 80, 80, 0.15);
            border-left: 3px solid #ff5555;
            color: #ffaaaa;
            display: block;
        }

        .btn-check {
            background: linear-gradient(135deg, #00a6ff, #00ff9d);
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .btn-check:hover {
            transform: translateY(-1px);
        }

        /* ========== MOBILE - SAME AS PC LAYOUT ========== */
        @media (max-width: 768px) {
            .navbar {
                padding: 8px 12px;
            }
            
            .logo i {
                font-size: 20px;
            }
            
            .logo h1 {
                font-size: 14px;
            }
            
            .lang-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            
            /* Same flex layout as PC */
            .main-container {
                display: flex;
                flex-direction: row;
            }
            
            /* Sidebar fixed width on mobile also */
            .sidebar {
                width: 240px;
                position: sticky;
                top: 60px;
                height: calc(100vh - 60px);
                overflow-y: auto;
                border-right: 1px solid #2d2d44;
                border-bottom: none;
                white-space: normal;
            }
            
            .sidebar h3 {
                display: block;
                font-size: 12px;
            }
            
            .topic-list {
                display: block;
                white-space: normal;
            }
            
            .topic-list li {
                display: block;
            }
            
            .topic-list a {
                padding: 6px 10px;
                font-size: 12px;
                white-space: normal;
            }
            
            .content-area {
                padding: 15px;
                flex: 1;
            }
            
            .topic-header h2 {
                font-size: 20px;
            }
            
            .content h3 {
                font-size: 16px;
            }
            
            .content p, .content li {
                font-size: 13px;
            }
            
            pre {
                font-size: 11px;
                padding: 12px;
            }
            
            .quiz-section {
                padding: 15px;
            }
            
            .quiz-section h3 {
                font-size: 16px;
            }
            
            .quiz-question h4 {
                font-size: 14px;
            }
            
            .quiz-option label {
                font-size: 13px;
            }
            
            .btn-check {
                width: 100%;
                padding: 10px;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 220px;
            }
            
            .topic-list a {
                padding: 5px 8px;
                font-size: 11px;
            }
            
            .topic-header h2 {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 200px;
            }
            
            .topic-list a {
                padding: 4px 6px;
                font-size: 10px;
            }
            
            pre {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-code"></i>
                <h1>Programming Master</h1>
            </div>
            <div class="language-selector" id="languageSelector">
                <button class="lang-btn active" data-lang="cpp">C++</button>
                <button class="lang-btn" data-lang="python">Python</button>
                <button class="lang-btn" data-lang="java">Java</button>
                <button class="lang-btn" data-lang="javascript">JS</button>
                <button class="lang-btn" data-lang="htmlcss">HTML/CSS</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar" id="sidebarTopics">
            <h3>📚 TOPICS</h3>
            <ul class="topic-list" id="topicList"></ul>
        </aside>
        <main class="content-area" id="contentArea"></main>
    </div>

    <script>
        // Topics List - All 9 Topics
        const topicsList = [
            { id: "intro", name: "1. Introduction" },
            { id: "basics", name: "2. Basic Syntax" },
            { id: "variables", name: "3. Variables & Data Types" },
            { id: "operators", name: "4. Operators" },
            { id: "conditionals", name: "5. Conditionals" },
            { id: "loops", name: "6. Loops" },
            { id: "functions", name: "7. Functions" },
            { id: "arrays", name: "8. Arrays/Lists" },
            { id: "oop", name: "9. OOP" }
        ];

        // ==================== C++ COMPLETE ====================
        const cppData = {
            intro: { title: "Introduction to C++", content: `<p>C++ is a powerful general-purpose programming language developed by Bjarne Stroustrup in 1979 at Bell Labs.</p><h3>Key Features:</h3><ul><li>Object-Oriented Programming</li><li>Platform Independent</li><li>Rich Standard Library (STL)</li><li>Fast and Efficient</li></ul><div class="code-block"><div class="code-header"><span>📝 First C++ Program</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>#include &lt;iostream&gt;\nusing namespace std;\n\nint main() {\n    cout &lt;&lt; "Hello, World!" &lt;&lt; endl;\n    return 0;\n}</code></pre></div>`, quiz: { q: "Who developed C++?", opts: ["Dennis Ritchie", "Bjarne Stroustrup", "James Gosling"], ans: 1, exp: "Bjarne Stroustrup developed C++ in 1979." } },
            basics: { title: "Basic Syntax", content: `<div class="code-block"><div class="code-header"><span>📝 Program Structure</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>#include &lt;iostream&gt;\nusing namespace std;\n\nint main() {\n    // This is a comment\n    cout &lt;&lt; "Learning C++" &lt;&lt; endl;\n    return 0;\n}</code></pre></div>`, quiz: { q: "What is the entry point?", opts: ["start()", "begin()", "main()"], ans: 2, exp: "main() is the entry point." } },
            variables: { title: "Variables & Data Types", content: `<div class="code-block"><div class="code-header"><span>📝 Variables</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>int age = 25;\nfloat price = 99.99;\nchar grade = 'A';\nbool isPass = true;\nstring name = "John";</code></pre></div>`, quiz: { q: "Data type for whole numbers?", opts: ["float", "double", "int"], ans: 2, exp: "int stores whole numbers." } },
            operators: { title: "Operators", content: `<div class="code-block"><div class="code-header"><span>📝 Operators</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>int sum = 10 + 5;\nint mod = 10 % 3;\nbool isEqual = (10 == 5);\nbool andResult = (true && false);</code></pre></div>`, quiz: { q: "10 % 3 = ?", opts: ["3", "1", "0"], ans: 1, exp: "% gives remainder: 1." } },
            conditionals: { title: "Conditionals", content: `<div class="code-block"><div class="code-header"><span>📝 If-Else</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>int age = 18;\nif (age >= 18) {\n    cout << "Adult";\n} else {\n    cout << "Minor";\n}</code></pre></div>`, quiz: { q: "if(5>10) is?", opts: ["true", "false"], ans: 1, exp: "5 is not greater than 10." } },
            loops: { title: "Loops", content: `<div class="code-block"><div class="code-header"><span>📝 For Loop</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>for(int i = 1; i <= 5; i++) {\n    cout << i << " ";\n}</code></pre></div>`, quiz: { q: "How many times? for(i=0;i<3;i++)", opts: ["2", "3", "4"], ans: 1, exp: "Runs 3 times: 0,1,2." } },
            functions: { title: "Functions", content: `<div class="code-block"><div class="code-header"><span>📝 Function</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>int add(int a, int b) {\n    return a + b;\n}\n// Call: int result = add(5, 3);</code></pre></div>`, quiz: { q: "void means?", opts: ["Returns int", "Returns nothing"], ans: 1, exp: "void means no return value." } },
            arrays: { title: "Arrays", content: `<div class="code-block"><div class="code-header"><span>📝 Array</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>int nums[5] = {10,20,30,40,50};\ncout << nums[0]; // First element</code></pre></div>`, quiz: { q: "First array index?", opts: ["1", "0"], ans: 1, exp: "Arrays start at 0." } },
            oop: { title: "Object Oriented Programming", content: `<div class="code-block"><div class="code-header"><span>📝 Class</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>class Car {\npublic:\n    string brand;\n    void display() {\n        cout << brand;\n    }\n};</code></pre></div>`, quiz: { q: "What is a class?", opts: ["Variable", "Blueprint for objects"], ans: 1, exp: "Class is blueprint for objects." } }
        };

        // ==================== PYTHON ====================
        const pythonData = JSON.parse(JSON.stringify(cppData));
        pythonData.intro.content = `<p>Python is a high-level, interpreted language created by Guido van Rossum in 1991.</p><div class="code-block"><div class="code-header"><span>📝 First Python Program</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>print("Hello, World!")</code></pre></div>`;
        pythonData.intro.quiz = { q: "Who created Python?", opts: ["Guido van Rossum", "Bjarne Stroustrup", "James Gosling"], ans: 0, exp: "Guido van Rossum created Python." };
        pythonData.variables.content = `<div class="code-block"><div class="code-header"><span>📝 Variables</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>x = 10          # int\ny = 3.14        # float\nname = "John"   # str\nis_valid = True # bool</code></pre></div>`;
        pythonData.operators.content = `<div class="code-block"><div class="code-header"><span>📝 Operators</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>sum = 10 + 5\npower = 2 ** 3  # 8\nis_equal = (10 == 5)</code></pre></div>`;
        pythonData.loops.content = `<div class="code-block"><div class="code-header"><span>📝 For Loop</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>for i in range(5):\n    print(i)</code></pre></div>`;
        pythonData.functions.content = `<div class="code-block"><div class="code-header"><span>📝 Function</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>def add(a, b):\n    return a + b\nresult = add(5, 3)</code></pre></div>`;
        pythonData.arrays.content = `<div class="code-block"><div class="code-header"><span>📝 List</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>numbers = [10,20,30]\nnumbers.append(40)</code></pre></div>`;
        pythonData.oop.content = `<div class="code-block"><div class="code-header"><span>📝 Class</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>class Car:\n    def __init__(self, brand):\n        self.brand = brand</code></pre></div>`;

        // ==================== JAVA ====================
        const javaData = JSON.parse(JSON.stringify(cppData));
        javaData.intro.content = `<p>Java is object-oriented, created by James Gosling in 1995.</p><div class="code-block"><div class="code-header"><span>📝 First Java Program</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello!");\n    }\n}</code></pre></div>`;
        javaData.intro.quiz = { q: "Who created Java?", opts: ["James Gosling", "Dennis Ritchie", "Guido van Rossum"], ans: 0, exp: "James Gosling created Java." };
        javaData.variables.content = `<div class="code-block"><div class="code-header"><span>📝 Variables</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>int age = 25;\ndouble price = 99.99;\nchar grade = 'A';\nString name = "John";</code></pre></div>`;

        // ==================== JAVASCRIPT ====================
        const jsData = JSON.parse(JSON.stringify(cppData));
        jsData.intro.content = `<p>JavaScript is the language of the web, created in 1995.</p><div class="code-block"><div class="code-header"><span>📝 First JS Program</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>console.log("Hello, World!");</code></pre></div>`;
        jsData.intro.quiz = { q: "JavaScript is used for?", opts: ["Frontend", "Backend", "Both"], ans: 2, exp: "JavaScript works on both." };
        jsData.variables.content = `<div class="code-block"><div class="code-header"><span>📝 Variables</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>let age = 25;\nconst PI = 3.14;\nlet name = "John";</code></pre></div>`;

        // ==================== HTML/CSS ====================
        const htmlData = JSON.parse(JSON.stringify(cppData));
        htmlData.intro.content = `<p>HTML structures web pages, CSS styles them.</p><div class="code-block"><div class="code-header"><span>📝 HTML Structure</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>&lt;h1&gt;Hello World!&lt;/h1&gt;\n&lt;p&gt;This is a paragraph.&lt;/p&gt;</code></pre></div>`;
        htmlData.intro.quiz = { q: "HTML stands for?", opts: ["Hyper Text Markup Language", "High Tech Language"], ans: 0, exp: "HTML = Hyper Text Markup Language." };
        htmlData.variables.content = `<div class="code-block"><div class="code-header"><span>📝 Common Tags</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code>&lt;h1&gt;Heading&lt;/h1&gt;\n&lt;p&gt;Paragraph&lt;/p&gt;\n&lt;a href="url"&gt;Link&lt;/a&gt;</code></pre></div>`;

        const allLanguages = {
            cpp: { name: "C++", data: cppData },
            python: { name: "Python", data: pythonData },
            java: { name: "Java", data: javaData },
            javascript: { name: "JavaScript", data: jsData },
            htmlcss: { name: "HTML/CSS", data: htmlData }
        };

        let currentLang = 'cpp';
        let currentTopic = 'intro';
        let completed = JSON.parse(localStorage.getItem('progMasterComplete')) || {};

        function updateProgress() {
            if (!completed[currentLang]) completed[currentLang] = [];
            localStorage.setItem('progMasterComplete', JSON.stringify(completed));
        }

        function markComplete(topicId) {
            if (!completed[currentLang]) completed[currentLang] = [];
            if (!completed[currentLang].includes(topicId)) {
                completed[currentLang].push(topicId);
                updateProgress();
            }
        }

        function loadTopic(topicId) {
            currentTopic = topicId;
            const topicData = allLanguages[currentLang].data[topicId];
            if (!topicData) return;
            
            document.getElementById('contentArea').innerHTML = `
                <div class="topic-content active">
                    <div class="topic-header">
                        <h2>${topicData.title}</h2>
                    </div>
                    <div class="content">${topicData.content}</div>
                    <div class="quiz-section">
                        <h3>📝 Test Your Knowledge</h3>
                        <div class="quiz-question">
                            <h4>${topicData.quiz.q}</h4>
                            <div class="quiz-options" id="quizOptions">
                                ${topicData.quiz.opts.map((opt, i) => `
                                    <div class="quiz-option" onclick="selectQuizOption(${i})">
                                        <input type="radio" name="quiz" value="${i}" id="opt${i}">
                                        <label for="opt${i}">${opt}</label>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="quiz-feedback" id="quizFeedback"></div>
                            <button class="btn-check" onclick="checkQuizAnswer()">✓ Check Answer</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.topic-list a').forEach(link => {
                if(link.dataset.topic === topicId) link.classList.add('active');
                else link.classList.remove('active');
            });
            
            const sidebar = document.getElementById('sidebarTopics');
            if (topicId !== 'intro') {
                sidebar.classList.add('hide-sidebar');
            } else {
                sidebar.classList.remove('hide-sidebar');
            }
        }

        function selectQuizOption(idx) {
            const radios = document.querySelectorAll('input[name="quiz"]');
            if (radios[idx]) radios[idx].checked = true;
        }

        function checkQuizAnswer() {
            const selected = document.querySelector('input[name="quiz"]:checked');
            if (!selected) { alert('Please select an answer!'); return; }
            
            const answer = parseInt(selected.value);
            const fb = document.getElementById('quizFeedback');
            const topicData = allLanguages[currentLang].data[currentTopic];
            
            if(answer === topicData.quiz.ans) {
                fb.innerHTML = `✅ Correct! ${topicData.quiz.exp}`;
                fb.className = 'quiz-feedback correct';
                markComplete(currentTopic);
                setTimeout(() => {
                    const currentIndex = topicsList.findIndex(t => t.id === currentTopic);
                    if (currentIndex < topicsList.length - 1) {
                        loadTopic(topicsList[currentIndex + 1].id);
                    } else {
                        alert('🎉 Congratulations! You completed all topics for ' + allLanguages[currentLang].name + '!');
                    }
                }, 1200);
            } else {
                fb.innerHTML = `❌ Wrong! Correct: ${topicData.quiz.opts[topicData.quiz.ans]}<br>💡 ${topicData.quiz.exp}`;
                fb.className = 'quiz-feedback wrong';
            }
        }

        function loadLanguage(lang) {
            currentLang = lang;
            currentTopic = 'intro';
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.dataset.lang === lang) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            
            const topicList = document.getElementById('topicList');
            topicList.innerHTML = topicsList.map(topic => `
                <li><a href="#" data-topic="${topic.id}">${topic.name}</a></li>
            `).join('');
            
            document.querySelectorAll('.topic-list a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loadTopic(link.dataset.topic);
                });
            });
            
            const sidebar = document.getElementById('sidebarTopics');
            sidebar.classList.remove('hide-sidebar');
            
            updateProgress();
            loadTopic('intro');
        }

        window.copyCode = function(btn) {
            const code = btn.closest('.code-block').querySelector('pre').innerText;
            navigator.clipboard.writeText(code);
            const old = btn.innerHTML;
            btn.innerHTML = 'Copied!';
            setTimeout(() => btn.innerHTML = old, 1500);
        };
        
        window.selectQuizOption = selectQuizOption;
        window.checkQuizAnswer = checkQuizAnswer;
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => loadLanguage(btn.dataset.lang));
        });
        
        loadLanguage('cpp');
    </script>

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker registered', reg))
      .catch(err => console.log('Service Worker error', err));
  }
