<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Programming Master - Learn Coding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        /* Header */
        .header {
            background: #282A35;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
        }
        .logo span {
            color: #04AA6D;
        }
        .signup {
            background: #04AA6D;
            padding: 6px 18px;
            border-radius: 25px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: bold;
        }
        /* Search Bar */
        .search-container {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
        }
        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #04AA6D;
        }
        /* Language Bar */
        .lang-bar {
            background: white;
            padding: 8px 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            overflow-x: auto;
        }
        .lang-bar button {
            background: none;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }
        .lang-bar button.active {
            color: #04AA6D;
            border-bottom: 2px solid #04AA6D;
        }
        /* Hero Section - Tight */
        .hero {
            background: #282A35;
            color: white;
            text-align: center;
            padding: 15px 20px;
        }
        .hero h1 {
            font-size: 36px;
            margin-bottom: 5px;
        }
        .hero p {
            font-size: 16px;
            opacity: 0.9;
        }
        /* Container */
        .container {
            display: flex;
            flex-direction: row;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
        }
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #E7E9EB;
            padding: 15px;
            min-height: 500px;
            position: sticky;
            top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
        }
        .sidebar h3 {
            margin-bottom: 12px;
            font-size: 16px;
        }
        .sidebar a {
            display: block;
            padding: 8px 10px;
            margin: 4px 0;
            background: #f1f1f1;
            text-decoration: none;
            color: black;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .sidebar a.active {
            background: #04AA6D;
            color: white;
        }
        .sidebar a.hidden-topic {
            display: none;
        }
        /* Content */
        .content {
            flex: 1;
            padding: 20px 25px;
            background: white;
        }
        .content h2 {
            font-size: 24px;
            margin-bottom: 15px;
        }
        .content p {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        /* Code Block */
        .code-block {
            background: #E7E9EB;
            margin: 20px 0;
            border-radius: 5px;
            overflow: hidden;
        }
        .code-header {
            background: #f1f1f1;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap;
            gap: 8px;
        }
        .copy-btn {
            background: #04AA6D;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        pre {
            background: #1e1e2e;
            color: #d4d4d4;
            padding: 15px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 13px;
            margin: 0;
        }
        .try-btn {
            background: #04AA6D;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px 0;
            font-weight: bold;
        }
        /* Quiz Area */
        .quiz-area {
            background: #E7E9EB;
            padding: 20px;
            margin-top: 25px;
            border-radius: 5px;
        }
        .quiz-area h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }
        .quiz-question {
            font-weight: bold;
            margin: 12px 0;
            font-size: 16px;
        }
        .quiz-option {
            background: white;
            padding: 10px 12px;
            margin: 8px 0;
            cursor: pointer;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .quiz-option:hover {
            background: #ddd;
        }
        .quiz-option input {
            width: 16px;
            height: 16px;
        }
        .quiz-option label {
            cursor: pointer;
            flex: 1;
        }
        .feedback {
            padding: 10px;
            margin: 12px 0;
            border-radius: 5px;
            display: none;
        }
        .feedback.correct {
            background: #d4edda;
            color: green;
            display: block;
        }
        .feedback.wrong {
            background: #f8d7da;
            color: red;
            display: block;
        }
        .quiz-btn {
            background: #04AA6D;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
            font-weight: bold;
        }
        .progress {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            padding: 8px;
            background: #f1f1f1;
            border-radius: 5px;
        }
        .footer {
            background: #282A35;
            color: #aaa;
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }

        /* ========== MOBILE RESPONSIVE ========== */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                position: relative;
                top: 0;
                height: auto;
                padding: 12px;
                border-bottom: 1px solid #ddd;
                overflow-x: auto;
            }
            .sidebar h3 {
                display: none;
            }
            .sidebar a {
                display: inline-block;
                margin: 3px;
                padding: 6px 12px;
                font-size: 13px;
            }
            .content {
                padding: 15px;
            }
            .content h2 {
                font-size: 20px;
            }
            .hero {
                padding: 10px 15px;
            }
            .hero h1 {
                font-size: 26px;
                margin-bottom: 3px;
            }
            .hero p {
                font-size: 13px;
            }
            .search-box {
                max-width: 100%;
                padding: 8px 12px;
                font-size: 13px;
            }
            .lang-bar {
                padding: 6px 12px;
                gap: 5px;
            }
            .lang-bar button {
                padding: 5px 10px;
                font-size: 12px;
            }
            .header {
                padding: 10px 15px;
            }
            .logo {
                font-size: 18px;
            }
            .signup {
                padding: 5px 15px;
                font-size: 12px;
            }
            .code-header span {
                font-size: 12px;
            }
            pre {
                font-size: 11px;
                padding: 10px;
            }
            .quiz-option {
                padding: 8px 10px;
            }
            .quiz-option label {
                font-size: 13px;
            }
            .quiz-question {
                font-size: 14px;
            }
            .quiz-btn {
                padding: 6px 15px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .sidebar a {
                padding: 5px 10px;
                font-size: 12px;
            }
            .content {
                padding: 12px;
            }
            .content h2 {
                font-size: 18px;
            }
            .quiz-area {
                padding: 15px;
            }
            .quiz-option label {
                font-size: 12px;
            }
            .hero {
                padding: 8px 12px;
            }
            .hero h1 {
                font-size: 22px;
            }
            .hero p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Programming<span>Master</span></div>
    <button class="signup" onclick="alert('Sign up to track progress!')">Sign Up</button>
</div>

<!-- Search Bar -->
<div class="search-container">
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search topics... (e.g., Variables, Loops, Functions)">
</div>

<div class="lang-bar" id="langBar">
    <button onclick="selectLang('cpp')" class="active">C++</button>
    <button onclick="selectLang('python')">Python</button>
    <button onclick="selectLang('java')">Java</button>
    <button onclick="selectLang('js')">JavaScript</button>
    <button onclick="selectLang('html')">HTML/CSS</button>
</div>

<div class="hero">
    <h1>Learn to Code</h1>
    <p>With the world's largest web developer site.</p>
</div>

<div class="container">
    <div class="sidebar" id="sidebar">
        <h3 id="langTitle">C++ Tutorial</h3>
        <div id="topicList"></div>
        <div class="progress" id="progress">Progress: 0/90</div>
    </div>
    <div class="content" id="content"></div>
</div>

<div class="footer">
    <p>Programming Master - Learn coding for free</p>
</div>

<script>
    // Topics
    const topics = ["Introduction", "Basic Syntax", "Variables", "Operators", "Conditionals", "Loops", "Functions", "Arrays", "OOP"];
    
    // Data for each language
    const langData = {
        cpp: { name: "C++", code: {
            Introduction: '#include <iostream>\nusing namespace std;\n\nint main() {\n    cout << "Hello, World!" << endl;\n    return 0;\n}',
            "Basic Syntax": '#include <iostream>\nusing namespace std;\n\nint main() {\n    // This is a comment\n    cout << "Learning C++" << endl;\n    return 0;\n}',
            Variables: 'int age = 25;\nfloat price = 99.99;\nchar grade = \'A\';\nbool isPass = true;\nstring name = "John";',
            Operators: 'int sum = 10 + 5;\nint mod = 10 % 3;\nbool isEqual = (10 == 5);',
            Conditionals: 'int age = 18;\nif (age >= 18) {\n    cout << "Adult";\n} else {\n    cout << "Minor";\n}',
            Loops: 'for(int i = 1; i <= 5; i++) {\n    cout << i << " ";\n}',
            Functions: 'int add(int a, int b) {\n    return a + b;\n}\n\nint result = add(5, 3);',
            Arrays: 'int numbers[5] = {10, 20, 30, 40, 50};\ncout << numbers[0];',
            OOP: 'class Car {\npublic:\n    string brand;\n    void display() {\n        cout << brand;\n    }\n};'
        }, quiz: {
            Introduction: { q: "Who developed C++?", opts: ["Dennis Ritchie", "Bjarne Stroustrup", "James Gosling"], ans: 1, exp: "Bjarne Stroustrup developed C++." },
            "Basic Syntax": { q: "How to write a single-line comment?", opts: ["//", "/*", "#"], ans: 0, exp: "// is for single-line comments." },
            Variables: { q: "Which data type stores whole numbers?", opts: ["float", "int", "char"], ans: 1, exp: "int stores whole numbers." },
            Operators: { q: "What is 10 % 3?", opts: ["3", "1", "0"], ans: 1, exp: "Modulus gives remainder 1." },
            Conditionals: { q: "if(5>10) is?", opts: ["true", "false"], ans: 1, exp: "5 is not greater than 10." },
            Loops: { q: "for(i=0;i<3;i++) runs how many times?", opts: ["2", "3", "4"], ans: 1, exp: "Runs 3 times." },
            Functions: { q: "void means?", opts: ["Returns int", "Returns nothing"], ans: 1, exp: "void returns nothing." },
            Arrays: { q: "First array index?", opts: ["1", "0"], ans: 1, exp: "Arrays start at 0." },
            OOP: { q: "What is a class?", opts: ["Blueprint for objects", "Variable"], ans: 0, exp: "Class is blueprint for objects." }
        }},
        python: { name: "Python", code: {
            Introduction: 'print("Hello, World!")',
            "Basic Syntax": '# This is a comment\nname = "John"\nprint(name)',
            Variables: 'x = 10\ny = 3.14\nname = "John"\nis_valid = True',
            Operators: 'sum = 10 + 5\npower = 2 ** 3\nis_equal = (10 == 5)',
            Conditionals: 'age = 18\nif age >= 18:\n    print("Adult")\nelse:\n    print("Minor")',
            Loops: 'for i in range(5):\n    print(i)',
            Functions: 'def add(a, b):\n    return a + b\n\nresult = add(5, 3)',
            Arrays: 'numbers = [10, 20, 30, 40]\nnumbers.append(50)',
            OOP: 'class Car:\n    def __init__(self, brand):\n        self.brand = brand'
        }, quiz: {
            Introduction: { q: "Who created Python?", opts: ["Guido van Rossum", "Bjarne Stroustrup", "James Gosling"], ans: 0, exp: "Guido van Rossum created Python." }
        }},
        java: { name: "Java", code: {
            Introduction: 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello World!");\n    }\n}',
            "Basic Syntax": 'public class Main {\n    public static void main(String[] args) {\n        // Comment\n        System.out.println("Java");\n    }\n}',
            Variables: 'int age = 25;\ndouble price = 99.99;\nchar grade = \'A\';\nString name = "John";',
            Operators: 'int sum = 10 + 5;\nint mod = 10 % 3;\nboolean isEqual = (10 == 5);',
            Conditionals: 'int age = 18;\nif (age >= 18) {\n    System.out.println("Adult");\n} else {\n    System.out.println("Minor");\n}',
            Loops: 'for(int i = 1; i <= 5; i++) {\n    System.out.println(i);\n}',
            Functions: 'public static int add(int a, int b) {\n    return a + b;\n}',
            Arrays: 'int[] nums = {10, 20, 30, 40, 50};\nSystem.out.println(nums[0]);',
            OOP: 'public class Car {\n    String brand;\n    public Car(String brand) {\n        this.brand = brand;\n    }\n}'
        }, quiz: {
            Introduction: { q: "Who created Java?", opts: ["James Gosling", "Dennis Ritchie", "Guido van Rossum"], ans: 0, exp: "James Gosling created Java." }
        }},
        js: { name: "JavaScript", code: {
            Introduction: 'console.log("Hello, World!");',
            "Basic Syntax": '// Comment\nlet name = "John";\nconsole.log(name);',
            Variables: 'let age = 25;\nconst PI = 3.14;\nlet name = "John";',
            Operators: 'let sum = 10 + 5;\nlet mod = 10 % 3;\nlet isEqual = (10 == 5);',
            Conditionals: 'let age = 18;\nif (age >= 18) {\n    console.log("Adult");\n} else {\n    console.log("Minor");\n}',
            Loops: 'for(let i = 1; i <= 5; i++) {\n    console.log(i);\n}',
            Functions: 'function add(a, b) {\n    return a + b;\n}\n\nlet result = add(5, 3);',
            Arrays: 'let nums = [10, 20, 30, 40, 50];\nconsole.log(nums[0]);',
            OOP: 'class Car {\n    constructor(brand) {\n        this.brand = brand;\n    }\n}'
        }, quiz: {
            Introduction: { q: "JavaScript is used for?", opts: ["Web", "Mobile", "Both"], ans: 2, exp: "JavaScript works on web and mobile." }
        }},
        html: { name: "HTML/CSS", code: {
            Introduction: '<h1>Hello World!</h1>\n<p>This is a paragraph.</p>',
            "Basic Syntax": '<!-- Comment -->\n<h1>Heading</h1>\n<p>Paragraph</p>\n<a href="url">Link</a>',
            Variables: '<div class="container">\n    <h1>Heading</h1>\n    <p>Text</p>\n</div>',
            Operators: '/* CSS Selectors */\n.className { color: blue; }\n#idName { background: red; }',
            Conditionals: '@media (max-width: 600px) {\n    body { padding: 10px; }\n}',
            Loops: '.grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n}',
            Functions: '.container {\n    display: flex;\n    justify-content: center;\n}',
            Arrays: 'ul {\n    list-style: none;\n}\nli {\n    margin: 10px;\n}',
            OOP: '.card {\n    border: 1px solid #ccc;\n    padding: 20px;\n}\n.btn {\n    background: blue;\n    color: white;\n}'
        }, quiz: {
            Introduction: { q: "HTML stands for?", opts: ["Hyper Text Markup Language", "High Tech Language"], ans: 0, exp: "HTML = Hyper Text Markup Language." }
        }}
    };

    // Fill missing quizzes for other topics
    for(let lang in langData) {
        for(let topic of topics) {
            if(!langData[lang].quiz[topic]) {
                langData[lang].quiz[topic] = langData.cpp.quiz[topic];
            }
        }
    }

    let currentLang = "cpp";
    let currentTopic = "Introduction";
    let selectedAnswer = null;
    let answered = false;
    let completed = JSON.parse(localStorage.getItem("completed")) || {};

    function updateProgress() {
        let count = 0;
        for(let key in completed) count++;
        document.getElementById("progress").innerHTML = `Progress: ${count}/90`;
    }

    function markComplete() {
        let id = currentLang + "_" + currentTopic;
        if(!completed[id]) {
            completed[id] = true;
            localStorage.setItem("completed", JSON.stringify(completed));
            updateProgress();
        }
    }

    function selectLang(lang) {
        currentLang = lang;
        currentTopic = "Introduction";
        selectedAnswer = null;
        answered = false;
        
        document.querySelectorAll("#langBar button").forEach(btn => btn.classList.remove("active"));
        event.target.classList.add("active");
        
        document.getElementById("langTitle").innerHTML = langData[lang].name + " Tutorial";
        renderTopics();
        renderContent();
        updateProgress();
        document.getElementById("searchBox").value = "";
        filterTopics("");
    }

    function renderTopics() {
        let html = "";
        for(let topic of topics) {
            html += `<a onclick="selectTopic('${topic}')" class="${topic === currentTopic ? 'active' : ''}" data-topic="${topic}">${topic}</a>`;
        }
        document.getElementById("topicList").innerHTML = html;
    }

    function filterTopics(searchText) {
        let allTopics = document.querySelectorAll("#topicList a");
        let searchLower = searchText.toLowerCase();
        let found = false;
        
        allTopics.forEach(topic => {
            let topicName = topic.getAttribute("data-topic").toLowerCase();
            if(topicName.includes(searchLower) || searchLower === "") {
                topic.style.display = "block";
                found = true;
            } else {
                topic.style.display = "none";
            }
        });
        
        // If no results found, show message
        let noResultMsg = document.getElementById("noResultMsg");
        if(!found && searchText !== "") {
            if(!noResultMsg) {
                let msg = document.createElement("div");
                msg.id = "noResultMsg";
                msg.style.padding = "10px";
                msg.style.textAlign = "center";
                msg.style.color = "#666";
                msg.innerHTML = "No topics found";
                document.getElementById("topicList").after(msg);
            } else {
                noResultMsg.style.display = "block";
            }
        } else if(noResultMsg) {
            noResultMsg.style.display = "none";
        }
    }

    function selectTopic(topic) {
        currentTopic = topic;
        selectedAnswer = null;
        answered = false;
        renderTopics();
        renderContent();
        document.getElementById("searchBox").value = "";
        filterTopics("");
    }

    function renderContent() {
        let data = langData[currentLang];
        let code = data.code[currentTopic];
        let quiz = data.quiz[currentTopic];
        
        let html = `
            <h2>${currentTopic}</h2>
            <p>Learn ${currentTopic} in ${data.name} with examples and exercises.</p>
            
            <div class="code-block">
                <div class="code-header">
                    <span>Example</span>
                    <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                </div>
                <pre><code>${escapeHtml(code)}</code></pre>
            </div>
            
            <button class="try-btn" onclick="alert('Open your code editor and try it yourself!')">Try it Yourself »</button>
            
            <div class="quiz-area">
                <h3>Test Yourself</h3>
                <div class="quiz-question">${quiz.q}</div>
                <div id="quizOptions">
                    ${quiz.opts.map((opt, i) => `
                        <div class="quiz-option" onclick="selectAnswer(${i})">
                            <input type="radio" name="quiz" value="${i}" id="opt${i}">
                            <label for="opt${i}">${opt}</label>
                        </div>
                    `).join('')}
                </div>
                <div id="feedback" class="feedback"></div>
                <button class="quiz-btn" onclick="checkAnswer()">Submit Answer</button>
                <button class="quiz-btn" onclick="nextTopic()">Next Topic →</button>
            </div>
        `;
        
        document.getElementById("content").innerHTML = html;
        
        if(selectedAnswer !== null) {
            let radios = document.querySelectorAll('input[name="quiz"]');
            if(radios[selectedAnswer]) radios[selectedAnswer].checked = true;
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function selectAnswer(idx) {
        if(answered) return;
        selectedAnswer = idx;
        let radios = document.querySelectorAll('input[name="quiz"]');
        if(radios[idx]) radios[idx].checked = true;
    }

    function checkAnswer() {
        if(answered) {
            return;
        }
        if(selectedAnswer === null) {
            alert("Please select an answer!");
            return;
        }
        
        let quiz = langData[currentLang].quiz[currentTopic];
        let fb = document.getElementById("feedback");
        
        if(selectedAnswer === quiz.ans) {
            fb.innerHTML = `✅ Correct! ${quiz.exp}`;
            fb.className = "feedback correct";
            answered = true;
            markComplete();
        } else {
            fb.innerHTML = `❌ Wrong! Correct: ${quiz.opts[quiz.ans]}<br>💡 ${quiz.exp}`;
            fb.className = "feedback wrong";
        }
    }

    function nextTopic() {
        if(!answered) {
            alert("Please answer the quiz first!");
            return;
        }
        
        let idx = topics.indexOf(currentTopic);
        if(idx + 1 < topics.length) {
            currentTopic = topics[idx + 1];
            selectedAnswer = null;
            answered = false;
            renderTopics();
            renderContent();
            document.getElementById("searchBox").value = "";
            filterTopics("");
        } else {
            alert("🎉 Congratulations! You completed all topics for " + langData[currentLang].name + "!");
        }
    }

    function copyCode(btn) {
        let code = btn.closest(".code-block").querySelector("pre").innerText;
        navigator.clipboard.writeText(code);
        let original = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = original, 1500);
    }

    // Search functionality
    document.getElementById("searchBox").addEventListener("input", function(e) {
        filterTopics(e.target.value);
    });

    window.selectLang = selectLang;
    window.selectTopic = selectTopic;
    window.selectAnswer = selectAnswer;
    window.checkAnswer = checkAnswer;
    window.nextTopic = nextTopic;
    window.copyCode = copyCode;
    
    renderTopics();
    renderContent();
    updateProgress();
</script>
</body>
</html>
